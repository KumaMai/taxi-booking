services:
  db:
    image: postgres:16-alpine
    container_name: taxi_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: taxi_user
      POSTGRES_PASSWORD: taxi_pass_dev
      POSTGRES_DB: taxi_booking
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxi_user -d taxi_booking"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: taxi_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@taxi.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  postgres_dev_data:
